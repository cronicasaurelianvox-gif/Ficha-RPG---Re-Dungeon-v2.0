<svg id="svg-atributos-primarios" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg" class="atributos-svg">
  <!-- Defs para estilos -->
  <defs>
    <style>
      .atributo-circulo {
        fill: url(#gradient-atributo);
        stroke: #f1c96b;
        stroke-width: 2;
      }
      
      .atributo-texto-valor {
        font-size: 20px;
        font-weight: 900;
        fill: #2a1608;
        text-anchor: middle;
        dominant-baseline: middle;
      }
      
      .atributo-texto-sigla {
        font-size: 8px;
        font-weight: 700;
        fill: #2a1608;
        text-anchor: middle;
        dominant-baseline: middle;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      
      .atributo-grupo:hover .atributo-circulo {
        filter: drop-shadow(0 0 12px rgba(255, 210, 120, 0.9));
      }
    </style>
    
    <!-- Gradiente para os atributos -->
    <radialGradient id="gradient-atributo" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#ffe7a1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c98a2e;stop-opacity:1" />
    </radialGradient>
    
    <!-- Gradiente para o botão central -->
    <radialGradient id="gradient-botao-central" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#aa7e1a;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Círculo de referência (visual) -->
  <circle cx="210" cy="210" r="180" fill="none" stroke="none" opacity="0.3"/>

  <!-- ATRIBUTOS POSICIONADOS EM CÍRCULO (6 posições) -->
  
  <!-- 1. Topo - Força -->
  <g class="atributo-grupo" id="atributo-forca" data-atributo="forca">
    <circle class="atributo-circulo" cx="210" cy="50" r="34"/>
    <text class="atributo-texto-valor" x="210" y="46">18</text>
    <text class="atributo-texto-sigla" x="210" y="56">FOR</text>
  </g>

  <!-- 2. Direita-Cima (60°) - Vitalidade -->
  <g class="atributo-grupo" id="atributo-vitalidade" data-atributo="vitalidade">
    <circle class="atributo-circulo" cx="325.5" cy="115" r="34"/>
    <text class="atributo-texto-valor" x="325.5" y="111">16</text>
    <text class="atributo-texto-sigla" x="325.5" y="121">VIT</text>
  </g>

  <!-- 3. Direita-Baixo (120°) - Agilidade -->
  <g class="atributo-grupo" id="atributo-agilidade" data-atributo="agilidade">
    <circle class="atributo-circulo" cx="325.5" cy="305" r="34"/>
    <text class="atributo-texto-valor" x="325.5" y="301">15</text>
    <text class="atributo-texto-sigla" x="325.5" y="311">AGI</text>
  </g>

  <!-- 4. Baixo - Inteligência -->
  <g class="atributo-grupo" id="atributo-inteligencia" data-atributo="inteligencia">
    <circle class="atributo-circulo" cx="210" cy="370" r="34"/>
    <text class="atributo-texto-valor" x="210" y="366">14</text>
    <text class="atributo-texto-sigla" x="210" y="376">INT</text>
  </g>

  <!-- 5. Esquerda-Baixo (240°) - Percepção -->
  <g class="atributo-grupo" id="atributo-percepcao" data-atributo="percepcao">
    <circle class="atributo-circulo" cx="94.5" cy="305" r="34"/>
    <text class="atributo-texto-valor" x="94.5" y="301">17</text>
    <text class="atributo-texto-sigla" x="94.5" y="311">PER</text>
  </g>

  <!-- 6. Esquerda-Cima (300°) - Sorte -->
  <g class="atributo-grupo" id="atributo-sorte" data-atributo="sorte">
    <circle class="atributo-circulo" cx="94.5" cy="115" r="34"/>
    <text class="atributo-texto-valor" x="94.5" y="111">12</text>
    <text class="atributo-texto-sigla" x="94.5" y="121">SOR</text>
  </g>

  <!-- BOTÃO CENTRAL -->
  <g class="botao-central" id="botao-central-primarios" data-tipo="primarios">
    <!-- Círculo de fundo do botão -->
    <circle cx="210" cy="210" r="50" class="botao-circulo" fill="url(#gradient-botao-central)" stroke="#f1c96b" stroke-width="2"/>
    
    <!-- Imagem central (usando foreignObject para HTML) -->
    <foreignObject x="160" y="160" width="100" height="100" class="botao-imagem-container">
      <div xmlns="http://www.w3.org/1999/xhtml" class="botao-imagem-wrapper">
        <img src="https://i.imgur.com/4aV6EsV.png" alt="Botão Central" class="botao-imagem"/>
      </div>
    </foreignObject>
  </g>

  <!-- Linhas de conexão (opcional - visual) -->
  <g class="linhas-conexao" opacity="0.3" stroke="#f1c96b" stroke-width="1">
    <line x1="210" y1="84" x2="210" y2="160"/>
    <line x1="291.5" y1="149" x2="258" y2="191"/>
    <line x1="291.5" y1="271" x2="258" y2="229"/>
    <line x1="210" y1="336" x2="210" y2="260"/>
    <line x1="128.5" y1="271" x2="162" y2="229"/>
    <line x1="128.5" y1="149" x2="162" y2="191"/>
  </g>
</svg>
